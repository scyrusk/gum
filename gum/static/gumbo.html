<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GUMBO · Assistant</title>
<style>
  :root {
    --bg: #f6f7f9; --card: #ffffff; --text: #1a1c1e; --muted: #6b7280;
    --border: #e5e7eb; --accent: #4f46e5;
    --surface: #16a34a; --surface-bg: #dcfce7; --quiet: #6b7280;
    --chip: #eef2ff; --chip-text: #4338ca;
    --tab-active: #4f46e5; --tab-bg: #ffffff;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 8px 24px rgba(0,0,0,.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1115; --card: #191c22; --text: #e6e8eb; --muted: #9aa1ab;
      --border: #2a2f38; --accent: #818cf8;
      --surface: #4ade80; --surface-bg: #14361f; --quiet: #9aa1ab;
      --chip: #232a44; --chip-text: #b3bdf5;
      --tab-active: #818cf8; --tab-bg: #191c22;
      --shadow: 0 1px 3px rgba(0,0,0,.4), 0 10px 30px rgba(0,0,0,.35);
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5;
  }
  header {
    position: sticky; top: 0; z-index: 5; background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .bar { max-width: 860px; margin: 0 auto; display: flex; align-items: center; gap: 14px; padding: 14px 20px 0; }
  .logo { font-weight: 700; letter-spacing: .3px; font-size: 18px; }
  .logo span { color: var(--accent); }
  .sub { color: var(--muted); font-size: 13px; }
  .grow { flex: 1; }
  .toolbtn {
    border: 1px solid var(--border); border-radius: 10px; background: var(--card); color: var(--text);
    padding: 7px 12px; font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; gap: 6px; align-items: center;
  }
  .toolbtn:hover { border-color: var(--accent); }
  .toolbtn:active { transform: translateY(1px); }
  .toggle { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; color: var(--muted); cursor: pointer; user-select: none; }
  .toggle input { accent-color: var(--accent); width: 15px; height: 15px; }

  /* Project tabs */
  .tabs { max-width: 860px; margin: 0 auto; display: flex; align-items: center; gap: 4px;
          padding: 10px 20px 0; overflow-x: auto; }
  .tab {
    position: relative; white-space: nowrap; border: none; background: none; color: var(--muted);
    padding: 9px 14px 12px; font: inherit; font-size: 14px; font-weight: 600; cursor: pointer;
    border-bottom: 2px solid transparent; display: inline-flex; align-items: center; gap: 7px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--tab-active); border-bottom-color: var(--tab-active); }
  .tab .x { opacity: 0; font-weight: 700; font-size: 15px; line-height: 1; color: var(--muted);
            border-radius: 5px; padding: 0 3px; }
  .tab:hover .x { opacity: .7; }
  .tab .x:hover { opacity: 1; color: var(--text); background: var(--border); }
  .tab-add { color: var(--muted); font-size: 18px; font-weight: 700; padding: 6px 12px; border: none;
             background: none; cursor: pointer; border-radius: 8px; }
  .tab-add:hover { color: var(--accent); background: var(--chip); }

  .wrap { max-width: 860px; margin: 0 auto; padding: 24px 20px 80px; }

  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    box-shadow: var(--shadow); padding: 20px 22px; margin-bottom: 14px; animation: pop .18s ease;
  }
  .card.surfaced { border-color: var(--surface); }
  @keyframes pop { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .card-head { display: flex; align-items: flex-start; gap: 12px; }
  .title { font-size: 18px; font-weight: 650; line-height: 1.3; margin: 0; flex: 1; }
  .badge { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
           padding: 4px 9px; border-radius: 999px; white-space: nowrap; }
  .badge.surface { color: var(--surface); background: var(--surface-bg); }
  .badge.quiet { color: var(--quiet); background: var(--chip); }
  .desc { margin: 10px 0 0; font-size: 15px; }
  .rationale { color: var(--muted); font-size: 14px; border-left: 3px solid var(--border); padding-left: 12px; margin: 12px 0 0; }

  .scores { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  .score { font-size: 12px; background: var(--chip); color: var(--chip-text); padding: 4px 10px; border-radius: 999px; font-weight: 600; }
  .score b { font-weight: 800; }
  .eu { margin-left: auto; font-size: 12px; color: var(--muted); font-weight: 600; align-self: center; }

  .actions { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-top: 16px;
             padding-top: 14px; border-top: 1px solid var(--border); }
  .fb-label { font-size: 13px; color: var(--muted); margin-right: 2px; }
  .fb { border: 1px solid var(--border); border-radius: 9px; background: var(--card); color: var(--text);
        padding: 5px 11px; font-size: 15px; line-height: 1; cursor: pointer; transition: border-color .12s, background .12s; }
  .fb:hover { border-color: var(--accent); }
  .fb:active { transform: translateY(1px); }
  .fb.chosen { border-color: var(--surface); background: var(--surface-bg); }
  .actions.done .fb { cursor: default; opacity: .55; }
  .actions.done .fb.chosen { opacity: 1; }
  .fb-thanks { font-size: 13px; color: var(--surface); font-weight: 600; margin-left: 2px; }
  .chatbtn { margin-left: auto; border: 1px solid var(--accent); border-radius: 9px;
             background: var(--accent); color: #fff; padding: 6px 13px; font-size: 13px;
             font-weight: 600; cursor: pointer; }
  .chatbtn:hover { filter: brightness(1.08); }
  .chatbtn:active { transform: translateY(1px); }
  .card-actions { margin-left: auto; display: inline-flex; align-items: center; gap: 7px; }
  .card-actions .chatbtn { margin-left: 0; }
  .edit-suggestion, .execute-suggestion, .exec-decision, .exec-retry {
    border: 1px solid var(--border); border-radius: 9px; background: var(--card); color: var(--text);
    padding: 6px 12px; font: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .edit-suggestion:hover, .exec-retry:hover { border-color: var(--accent); }
  .execute-suggestion { border-color: var(--accent); background: var(--accent); color: #fff; }
  .execute-suggestion:hover { filter: brightness(1.08); }
  .execute-suggestion:disabled, .edit-suggestion:disabled { opacity: .5; cursor: default; }
  .execution-editor { margin-top: 14px; padding: 14px; border: 1px solid var(--border);
                      border-radius: 12px; background: var(--bg); }
  .execution-editor label { display: block; color: var(--muted); font-size: 12px; font-weight: 650;
                            margin: 0 0 5px; }
  .execution-editor input, .execution-editor textarea { width: 100%; border: 1px solid var(--border);
                            border-radius: 9px; background: var(--card); color: var(--text);
                            padding: 8px 10px; font: inherit; font-size: 14px; margin-bottom: 10px; }
  .execution-editor input:focus, .execution-editor textarea:focus { outline: none; border-color: var(--accent); }
  .execution-editor textarea { resize: vertical; min-height: 70px; }
  .execution-help { color: var(--muted); font-size: 12px; margin: -2px 0 0; }
  .execution-result { margin-top: 14px; padding: 14px; border: 1px solid var(--border);
                      border-radius: 12px; background: var(--bg); }
  .execution-result.pending_approval { border-color: var(--surface); }
  .exec-head { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; }
  .exec-copy { color: var(--muted); font-size: 13px; margin: 7px 0 0; }
  .exec-output { white-space: pre-wrap; overflow-wrap: anywhere; margin: 12px 0 0; padding: 13px;
                 border-radius: 10px; background: var(--card); border: 1px solid var(--border);
                 color: var(--text); font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; }
  .exec-review { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .exec-review-note { color: var(--muted); font-size: 12px; margin-right: auto; }
  .exec-decision[data-vote="up"] { border-color: var(--surface); color: var(--surface); }
  .exec-decision[data-vote="down"]:hover { border-color: #c0392b; color: #c0392b; }
  .exec-decision:disabled { opacity: .5; cursor: default; }
  .card.executing .execute-suggestion { opacity: .65; cursor: wait; }
  .execution-banner { margin-bottom: 14px; padding: 11px 14px; border: 1px solid var(--border);
                      border-radius: 11px; background: var(--chip); color: var(--muted); font-size: 13px; }
  .execution-banner code { color: var(--text); }

  /* "Start Chat" panel (paper §4.3.3) — talk to GUMBO about a suggestion */
  .chat { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .chat-log { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
  .msg { max-width: 82%; padding: 9px 13px; border-radius: 14px; font-size: 14px; line-height: 1.45; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 5px; }
  .msg.assistant { align-self: flex-start; background: var(--chip); color: var(--text); border-bottom-left-radius: 5px; }
  .msg.pending { color: var(--muted); font-style: italic; }
  .chat-input { display: flex; gap: 8px; }
  .chat-input textarea { flex: 1; resize: none; border: 1px solid var(--border); border-radius: 10px;
             background: var(--card); color: var(--text); padding: 9px 12px; font: inherit; font-size: 14px; min-height: 40px; }
  .chat-input textarea:focus { outline: none; border-color: var(--accent); }
  .chat-send { border: none; border-radius: 10px; background: var(--accent); color: #fff;
             padding: 0 16px; font: inherit; font-size: 14px; font-weight: 600; cursor: pointer; }
  .chat-send:disabled { opacity: .5; cursor: default; }

  .center { text-align: center; padding: 70px 20px; color: var(--muted); }
  .center h2 { color: var(--text); font-size: 20px; margin: 0 0 8px; }
  .big { font-size: 44px; margin-bottom: 10px; }
  .spinner { width: 26px; height: 26px; border: 3px solid var(--border); border-top-color: var(--accent);
             border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Top-level page nav (Suggestions / Memory) — the desktop app's sections */
  .nav { display: inline-flex; gap: 2px; background: var(--chip); padding: 3px; border-radius: 10px; }
  .navbtn { border: none; background: none; color: var(--muted); font: inherit; font-size: 13px;
            font-weight: 600; padding: 6px 13px; border-radius: 8px; cursor: pointer; }
  .navbtn:hover { color: var(--text); }
  .navbtn.active { background: var(--card); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,.12); }
  [hidden] { display: none !important; }
  .search { border: 1px solid var(--border); border-radius: 10px; background: var(--card); color: var(--text);
            padding: 7px 12px; font: inherit; font-size: 13px; min-width: 240px; }
  .search:focus { outline: none; border-color: var(--accent); }

  /* Memory page — a table of the raw propositions in the GUM (paper Fig 3B) */
  .mem-table { width: 100%; border-collapse: collapse; background: var(--card);
               border: 1px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: var(--shadow); }
  .mem-table th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .05em;
                  color: var(--muted); font-weight: 700; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .mem-table td { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: top; }
  .mem-table tr:last-child td { border-bottom: none; }
  .mem-table tbody tr:hover td { background: var(--bg); }
  .mem-prop { line-height: 1.45; }
  .mem-reason { color: var(--muted); font-size: 13px; margin-top: 5px; }
  .col-num { white-space: nowrap; width: 1px; text-align: center; }
  .pill { display: inline-block; font-size: 12px; font-weight: 700; background: var(--chip);
          color: var(--chip-text); padding: 3px 10px; border-radius: 999px; }
  /* Per-row "Forget" — lets the user curate the model (paper Fig 3B) */
  .mem-forget { font: inherit; font-size: 13px; cursor: pointer; color: var(--muted);
                background: transparent; border: 1px solid var(--border); border-radius: 8px;
                padding: 5px 12px; white-space: nowrap; transition: color .12s, border-color .12s; }
  .mem-forget:hover { color: #c0392b; border-color: #c0392b; }
  .mem-forget:disabled { opacity: .5; cursor: default; }
  .mem-table tr.forgetting td { opacity: .4; }
  .mem-actions { display: flex; gap: 6px; justify-content: flex-end; }
  /* Per-row "Edit" — correct a close-but-wrong proposition (paper Fig 3B) */
  .mem-edit { font: inherit; font-size: 13px; cursor: pointer; color: var(--muted);
              background: transparent; border: 1px solid var(--border); border-radius: 8px;
              padding: 5px 12px; white-space: nowrap; transition: color .12s, border-color .12s; }
  .mem-edit:hover { color: var(--accent); border-color: var(--accent); }
  .mem-edit:disabled { opacity: .5; cursor: default; }
  .mem-editor textarea, .mem-editor input { font: inherit; width: 100%; box-sizing: border-box;
              background: var(--card); color: var(--text); border: 1px solid var(--border);
              border-radius: 8px; padding: 7px 10px; margin-bottom: 6px; }
  .mem-editor .mem-conf-input { width: 5em; margin-bottom: 0; }
  .mem-editor label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 3px; }
  .mem-save { font: inherit; font-size: 13px; cursor: pointer; color: #fff; background: var(--accent);
              border: 1px solid var(--accent); border-radius: 8px; padding: 5px 12px; white-space: nowrap; }
  .mem-save:disabled { opacity: .5; cursor: default; }

  /* Agenda page — the commitment/deadline radar, editable (spec #1) */
  .agenda-section { margin-bottom: 22px; }
  .agenda-section > h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .06em;
              color: var(--muted); font-weight: 700; margin: 0 0 10px; }
  .agenda-section.overdue > h3 { color: #c0392b; }
  .day-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .day-nav button { border: 1px solid var(--border); background: var(--card); color: var(--text);
              border-radius: 9px; width: 34px; height: 34px; font-size: 17px; line-height: 1; cursor: pointer; }
  .day-nav button:hover { border-color: var(--accent); }
  .day-nav .day-label { font-size: 16px; font-weight: 650; }
  .ag-item { background: var(--card); border: 1px solid var(--border); border-radius: 14px;
              box-shadow: var(--shadow); padding: 14px 16px; margin-bottom: 10px; animation: pop .18s ease; }
  .ag-item.overdue { border-color: #c0392b55; }
  .ag-row { display: flex; align-items: flex-start; gap: 12px; }
  .ag-main { flex: 1; min-width: 0; }
  .ag-title { font-size: 15px; font-weight: 600; line-height: 1.35; }
  .ag-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; align-items: center; }
  .ag-chip { font-size: 12px; background: var(--chip); color: var(--chip-text);
              padding: 3px 10px; border-radius: 999px; font-weight: 600; }
  .ag-chip.due { background: var(--surface-bg); color: var(--surface); }
  .ag-chip.overdue { background: #fde8e6; color: #c0392b; }
  @media (prefers-color-scheme: dark) { .ag-chip.overdue { background: #3a1512; color: #f2a49b; } }
  .ag-chip.added { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  .ag-src { color: var(--muted); font-size: 12px; }
  .ag-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .ag-btn { font: inherit; font-size: 13px; cursor: pointer; color: var(--muted);
              background: transparent; border: 1px solid var(--border); border-radius: 8px;
              padding: 5px 11px; white-space: nowrap; transition: color .12s, border-color .12s; }
  .ag-btn:hover { color: var(--accent); border-color: var(--accent); }
  .ag-btn.danger:hover { color: #c0392b; border-color: #c0392b; }
  .ag-btn:disabled { opacity: .5; cursor: default; }
  .ag-note { color: var(--muted); font-size: 12px; font-style: italic; align-self: center; }
  .ag-editor { display: grid; gap: 10px; }
  .ag-editor label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 3px; }
  .ag-editor input[type=text], .ag-editor input[type=date], .ag-editor select {
              font: inherit; width: 100%; box-sizing: border-box; background: var(--card); color: var(--text);
              border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; }
  .ag-editor input:focus, .ag-editor select:focus { outline: none; border-color: var(--accent); }
  .ag-field-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .ag-field-row > div { flex: 1; min-width: 140px; }
  .ag-clear { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; color: var(--muted); cursor: pointer; }
  .ag-clear input { accent-color: var(--accent); width: 15px; height: 15px; }
  .ag-undo { display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="logo">GUMBO<span>·</span>Assistant</div>
    <nav class="nav" id="nav">
      <button class="navbtn active" data-view="suggestions">Suggestions</button>
      <button class="navbtn" data-view="agenda">Agenda</button>
      <button class="navbtn" data-view="memory">Memory</button>
    </nav>
    <div class="grow"></div>
    <label class="toggle view-suggestions" title="Only show suggestions the mixed-initiative filter would surface">
      <input type="checkbox" id="surfacedOnly" /> Worth surfacing only
    </label>
    <button class="toolbtn view-suggestions" id="refreshBtn" onclick="load(true)">↻ Refresh</button>
    <input class="search view-memory" id="memSearch" type="search"
           placeholder="Search your propositions…" hidden />
    <nav class="nav view-agenda" id="agendaGran" hidden>
      <button class="navbtn active" data-gran="week">Week</button>
      <button class="navbtn" data-gran="day">Day</button>
    </nav>
    <button class="toolbtn view-agenda" id="agendaRefresh" hidden>↻ Refresh</button>
  </div>
  <div class="tabs view-suggestions" id="tabs"></div>
</header>

<main class="wrap">
  <div id="main">
    <div class="center"><div class="spinner"></div>Thinking…</div>
  </div>
  <div id="memory" hidden></div>
  <div id="agenda" hidden></div>
</main>

<script>
  // ── Project tabs ──────────────────────────────────────────────────────────
  // The "All" tab uses no focus; each project tab passes its name as the
  // `focus` query param so GUMBO pulls related propositions for that project
  // (paper §4.3.1). Tabs are the user's own organizing labels, persisted
  // locally so the desktop app remembers them between sessions.
  const TABS_KEY = 'gumbo.tabs.v1';
  const ACTIVE_KEY = 'gumbo.activeTab.v1';
  const ALL = '__all__';

  const main = document.getElementById('main');
  const tabsEl = document.getElementById('tabs');
  const surfacedOnly = document.getElementById('surfacedOnly');
  const nav = document.getElementById('nav');
  const memoryEl = document.getElementById('memory');
  const memSearch = document.getElementById('memSearch');
  const agendaEl = document.getElementById('agenda');
  const agendaGranEl = document.getElementById('agendaGran');
  const agendaRefresh = document.getElementById('agendaRefresh');

  let projects = loadProjects();
  let active = localStorage.getItem(ACTIVE_KEY) || ALL;
  if (active !== ALL && !projects.includes(active)) active = ALL;
  let busy = false;
  let executionEnabled = false;

  function loadProjects() {
    try { const v = JSON.parse(localStorage.getItem(TABS_KEY)); return Array.isArray(v) ? v : []; }
    catch { return []; }
  }
  function saveProjects() { localStorage.setItem(TABS_KEY, JSON.stringify(projects)); }

  const esc = (s) => (s ?? '').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  // Attribute-safe variant: also escapes quotes so values survive inside data-* attrs.
  const escAttr = (s) => (s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  function renderTabs() {
    const mk = (key, label, removable) => {
      const b = document.createElement('button');
      b.className = 'tab' + (key === active ? ' active' : '');
      b.appendChild(document.createTextNode(label));
      if (removable) {
        const x = document.createElement('span');
        x.className = 'x'; x.textContent = '×'; x.title = 'Remove project';
        x.onclick = (e) => { e.stopPropagation(); removeProject(key); };
        b.appendChild(x);
      }
      b.onclick = () => selectTab(key);
      return b;
    };
    tabsEl.replaceChildren();
    tabsEl.appendChild(mk(ALL, 'All', false));
    for (const p of projects) tabsEl.appendChild(mk(p, p, true));
    const add = document.createElement('button');
    add.className = 'tab-add'; add.textContent = '+'; add.title = 'Add a project';
    add.onclick = addProject;
    tabsEl.appendChild(add);
  }

  function selectTab(key) {
    if (key === active) return;
    active = key;
    localStorage.setItem(ACTIVE_KEY, active);
    renderTabs();
    load();
  }

  function addProject() {
    const name = (prompt('Name this project (GUMBO focuses suggestions on it):') || '').trim();
    if (!name) return;
    if (name.length > 60) { alert('Please keep project names under 60 characters.'); return; }
    if (!projects.includes(name)) { projects.push(name); saveProjects(); }
    selectTab(name);
    renderTabs();
  }

  function removeProject(name) {
    projects = projects.filter(p => p !== name);
    saveProjects();
    if (active === name) { active = ALL; localStorage.setItem(ACTIVE_KEY, active); }
    renderTabs();
    load();
  }

  // ── Suggestions ───────────────────────────────────────────────────────────
  async function load(force) {
    if (busy) return;
    busy = true;
    main.innerHTML = '<div class="center"><div class="spinner"></div>Thinking…</div>';
    const params = new URLSearchParams();
    if (active !== ALL) params.set('focus', active);
    if (surfacedOnly.checked) params.set('surfaced_only', 'true');
    params.set('limit', '20');
    try {
      const r = await fetch('/suggestions?' + params.toString());
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      executionEnabled = !!data.execution_enabled;
      render(data.suggestions || []);
    } catch (e) {
      main.innerHTML = '<div class="center"><h2>Couldn\'t reach GUMBO</h2><p>'
        + esc(String(e && e.message || e)) + '</p><p>Is GUM running?</p></div>';
    }
    busy = false;
  }

  function render(suggestions) {
    if (!suggestions.length) {
      const focused = active !== ALL;
      main.innerHTML = `
        <div class="center">
          <div class="big">🫧</div>
          <h2>Nothing to suggest right now</h2>
          <p>${focused
            ? 'GUMBO has no confident propositions related to <b>' + esc(active) + '</b> yet.'
            : 'GUMBO stays quiet until it is confident enough to help. Let GUM keep observing.'}</p>
        </div>`;
      return;
    }
    const banner = executionEnabled ? '' : `
      <div class="execution-banner">
        Execution is currently disabled. Restart GUM with <code>GUMBO_EXECUTION_ENABLED=1</code>
        to enable the guarded Execute buttons.
      </div>`;
    main.innerHTML = banner + suggestions.map(cardHtml).join('');
  }

  function scoreChip(label, val) {
    return `<span class="score">${label} <b>${val}</b>/10</span>`;
  }

  function cardHtml(s) {
    const badge = s.should_surface
      ? '<span class="badge surface">Worth surfacing</span>'
      : '<span class="badge quiet">Keeping quiet</span>';
    const eu = (typeof s.expected_utility === 'number')
      ? `<span class="eu">EU ${s.expected_utility.toFixed(1)}</span>` : '';
    const attr = (v) => escAttr(String(v ?? ''));
    const executeTitle = executionEnabled
      ? 'Execute this suggestion using the reversible, low-risk safety gate'
      : 'Execution is disabled — restart GUM with GUMBO_EXECUTION_ENABLED=1';
    return `
      <div class="card${s.should_surface ? ' surfaced' : ''}"
           data-title="${attr(s.title || '')}" data-desc="${attr(s.description || '')}"
           data-rationale="${attr(s.rationale || '')}"
           data-probability-useful="${attr(s.probability_useful)}"
           data-benefit="${attr(s.benefit)}" data-cost-if-wrong="${attr(s.cost_if_wrong)}"
           data-cost-if-missed="${attr(s.cost_if_missed)}">
        <div class="card-head">
          <h3 class="title">${esc(s.title)}</h3>
          ${badge}
        </div>
        ${s.description ? `<p class="desc">${esc(s.description)}</p>` : ''}
        ${s.rationale ? `<p class="rationale">${esc(s.rationale)}</p>` : ''}
        <div class="scores">
          ${scoreChip('Useful', s.probability_useful)}
          ${scoreChip('Benefit', s.benefit)}
          ${scoreChip('Cost if wrong', s.cost_if_wrong)}
          ${scoreChip('Cost if missed', s.cost_if_missed)}
          ${eu}
        </div>
        <div class="execution-editor" hidden>
          <label>Suggestion title</label>
          <input class="exec-title" type="text" value="${attr(s.title || '')}" />
          <label>What should GUMBO do?</label>
          <textarea class="exec-description" rows="3">${esc(s.description || '')}</textarea>
          <label>Additional execution instructions <span style="font-weight:400">(optional)</span></label>
          <textarea class="exec-comments" rows="3" placeholder="Add constraints, preferences, or context for the model…"></textarea>
          <p class="execution-help">These edits apply only to this run. Comments are included in the safety check and agent instructions.</p>
        </div>
        <div class="execution-result" hidden></div>
        <div class="actions">
          <span class="fb-label">Was this useful?</span>
          <button class="fb" data-vote="up" title="Helpful — GUMBO learns from this">👍</button>
          <button class="fb" data-vote="down" title="Not helpful — GUMBO learns from this">👎</button>
          <span class="card-actions">
            <button class="edit-suggestion" title="Edit this suggestion and add execution instructions">✎ Edit</button>
            <button class="execute-suggestion" ${executionEnabled ? '' : 'disabled'} title="${attr(executeTitle)}">▶ Execute</button>
            <button class="chatbtn" data-action="chat" title="Talk to GUMBO about this suggestion">💬 Start Chat</button>
          </span>
        </div>
      </div>`;
  }

  // ── Page views (Suggestions / Memory) ─────────────────────────────────────
  // The desktop app has two sections (paper Fig 3): the Suggestions page and the
  // Memory page — a browsable view of the raw propositions in the GUM. Switching
  // is client-side; the Memory list is fetched lazily the first time it's shown.
  const VIEW_KEY = 'gumbo.view.v1';
  const VIEWS = ['suggestions', 'memory', 'agenda'];
  const viewEls = { suggestions: main, memory: memoryEl, agenda: agendaEl };
  let view = VIEWS.includes(localStorage.getItem(VIEW_KEY)) ? localStorage.getItem(VIEW_KEY) : 'suggestions';
  let memoryLoaded = false;

  function setView(next) {
    if (!VIEWS.includes(next)) next = 'suggestions';
    view = next;
    localStorage.setItem(VIEW_KEY, view);
    for (const b of nav.querySelectorAll('.navbtn')) {
      b.classList.toggle('active', b.dataset.view === view);
    }
    // Per-view toolbar controls (.view-<name>) and content containers show only
    // for the active view. The generic loop keeps all three views in sync.
    for (const v of VIEWS) {
      const on = (v === view);
      document.querySelectorAll('.view-' + v).forEach(el => { el.hidden = !on; });
      if (viewEls[v]) viewEls[v].hidden = !on;
    }
    if (view === 'memory' && !memoryLoaded) loadMemory();
    else if (view === 'agenda' && !agendaLoaded) loadAgenda();
    else if (view === 'suggestions' && !document.querySelector('.card') && !busy) load();
  }

  // ── Memory page (raw propositions) ────────────────────────────────────────
  let memBusy = false;
  async function loadMemory() {
    if (memBusy) return;
    memBusy = true;
    memoryLoaded = true;
    memoryEl.innerHTML = '<div class="center"><div class="spinner"></div>Reading memory…</div>';
    const params = new URLSearchParams();
    const q = memSearch.value.trim();
    if (q) params.set('q', q);
    params.set('limit', '100');
    try {
      const r = await fetch('/memory?' + params.toString());
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      renderMemory(data.propositions || [], q);
    } catch (e) {
      memoryEl.innerHTML = '<div class="center"><h2>Couldn\'t read memory</h2><p>'
        + esc(String(e && e.message || e)) + '</p><p>Is GUM running?</p></div>';
    }
    memBusy = false;
  }

  function renderMemory(props, q) {
    if (!props.length) {
      memoryEl.innerHTML = `
        <div class="center">
          <div class="big">🧠</div>
          <h2>${q ? 'No matching propositions' : 'Memory is empty'}</h2>
          <p>${q
            ? 'Nothing in the GUM matches <b>' + esc(q) + '</b> yet.'
            : 'GUM builds up propositions as it observes. Let it keep watching.'}</p>
        </div>`;
      return;
    }
    const rows = props.map(p => {
      const conf = (typeof p.confidence === 'number')
        ? `<span class="pill">${p.confidence}/10</span>` : '<span class="mem-reason">—</span>';
      const support = (typeof p.support === 'number') ? p.support : '—';
      return `
        <tr data-id="${p.id}" data-text="${escAttr(p.text)}" data-reasoning="${escAttr(p.reasoning || '')}" data-confidence="${typeof p.confidence === 'number' ? p.confidence : ''}">
          <td class="mem-prop">${esc(p.text)}
            ${p.reasoning ? `<div class="mem-reason">${esc(p.reasoning)}</div>` : ''}</td>
          <td class="col-num mem-conf">${conf}</td>
          <td class="col-num">${support}</td>
          <td class="col-num mem-actions">
            <button class="mem-edit" title="Correct this proposition">Edit</button>
            <button class="mem-forget" title="Remove this from GUMBO's memory">Forget</button></td>
        </tr>`;
    }).join('');
    memoryEl.innerHTML = `
      <table class="mem-table">
        <thead><tr>
          <th>Proposition</th><th class="col-num">Confidence</th><th class="col-num">Support</th><th class="col-num"></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // ── Forget (curate memory, paper Fig 3B) ──────────────────────────────────
  // The user removes a proposition they judge wrong or unwanted. DELETE the row
  // from the GUM, then drop it from the table on success.
  async function forgetProposition(row) {
    const id = row.dataset.id;
    if (!id) return;
    const btn = row.querySelector('.mem-forget');
    if (!btn || btn.disabled) return;
    btn.disabled = true;
    row.classList.add('forgetting');
    try {
      const r = await fetch('/memory/' + encodeURIComponent(id), { method: 'DELETE' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      if (!data.ok) throw new Error('not found');
      row.remove();
      if (!memoryEl.querySelector('tbody tr')) loadMemory();
    } catch (e) {
      // Leave the row in place so the user can retry.
      row.classList.remove('forgetting');
      btn.disabled = false;
      btn.textContent = "Couldn't — retry";
    }
  }

  // ── Edit (curate memory, paper Fig 3B) ────────────────────────────────────
  // The user corrects a close-but-wrong proposition instead of forgetting it.
  // Swap the row into an inline editor, then PATCH /memory/{id} on save.
  function startEdit(row) {
    if (row.classList.contains('editing')) return;
    row.classList.add('editing');
    const text = row.dataset.text || '';
    const reasoning = row.dataset.reasoning || '';
    const confidence = row.dataset.confidence || '';
    const propCell = row.querySelector('.mem-prop');
    propCell.dataset.orig = propCell.innerHTML;
    propCell.classList.add('mem-editor');
    propCell.innerHTML = `
      <label>Proposition</label>
      <textarea class="mem-edit-text" rows="2">${esc(text)}</textarea>
      <label>Reasoning</label>
      <textarea class="mem-edit-reason" rows="2">${esc(reasoning)}</textarea>`;
    const confCell = row.querySelector('.mem-conf');
    confCell.dataset.orig = confCell.innerHTML;
    confCell.classList.add('mem-editor');
    confCell.innerHTML = `<input class="mem-conf-input" type="number" min="1" max="10" value="${esc(confidence)}">`;
    const actions = row.querySelector('.mem-actions');
    actions.dataset.orig = actions.innerHTML;
    actions.innerHTML = `
      <button class="mem-save">Save</button>
      <button class="mem-edit mem-cancel">Cancel</button>`;
    propCell.querySelector('.mem-edit-text').focus();
  }

  function cancelEdit(row) {
    row.classList.remove('editing');
    ['.mem-prop', '.mem-conf', '.mem-actions'].forEach(sel => {
      const cell = row.querySelector(sel);
      if (cell && cell.dataset.orig !== undefined) {
        cell.innerHTML = cell.dataset.orig;
        cell.classList.remove('mem-editor');
        delete cell.dataset.orig;
      }
    });
  }

  async function saveEdit(row) {
    const id = row.dataset.id;
    if (!id) return;
    const text = row.querySelector('.mem-edit-text').value.trim();
    const reasoning = row.querySelector('.mem-edit-reason').value.trim();
    const confRaw = row.querySelector('.mem-conf-input').value.trim();
    if (!text || !reasoning) return;  // empty proposition is meaningless
    const saveBtn = row.querySelector('.mem-save');
    saveBtn.disabled = true;
    const body = { text, reasoning };
    if (confRaw !== '') body.confidence = parseInt(confRaw, 10);
    try {
      const r = await fetch('/memory/' + encodeURIComponent(id), {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      if (!data.ok) throw new Error(data.error || 'failed');
      // Re-render the whole table so the row reflects the saved values cleanly.
      loadMemory();
    } catch (e) {
      saveBtn.disabled = false;
      saveBtn.textContent = "Couldn't — retry";
    }
  }

  memoryEl.addEventListener('click', (e) => {
    if (e.target.closest('.mem-cancel')) { cancelEdit(e.target.closest('tr')); return; }
    if (e.target.closest('.mem-save')) { saveEdit(e.target.closest('tr')); return; }
    if (e.target.closest('.mem-edit')) { startEdit(e.target.closest('tr')); return; }
    const btn = e.target.closest('.mem-forget');
    if (btn) forgetProposition(btn.closest('tr'));
  });

  // ── Agenda page (commitment & deadline radar, editable) ───────────────────
  // The same ranked radar the CLI `gum agenda` / MCP surface build, but here the
  // user can correct or dismiss items. The agenda is re-extracted by the model on
  // every load, so a single wide fetch is bucketed client-side (Week/Day) against
  // the server's `today` (never the browser clock), and edits are persisted as
  // overrides that the /agenda merge overlays. See gum.agenda.apply_overrides.
  const AG_GRAN_KEY = 'gumbo.agenda.gran.v1';
  let agendaGran = localStorage.getItem(AG_GRAN_KEY) === 'day' ? 'day' : 'week';
  let agendaLoaded = false, agBusy = false;
  let agItems = [];    // commitments from the last fetch
  let agToday = null;  // ISO 'YYYY-MM-DD' server-local "today"
  let agDay = null;    // ISO selected day (Day view)

  // String-based date math so bucketing matches the server's calendar day
  // regardless of the browser's timezone (UTC noon avoids DST edge shifts).
  function addDaysIso(iso, n) {
    const [y, m, d] = iso.split('-').map(Number);
    const dt = new Date(Date.UTC(y, m - 1, d, 12));
    dt.setUTCDate(dt.getUTCDate() + n);
    return dt.toISOString().slice(0, 10);
  }
  function fmtDayLabel(iso) {
    const [y, m, d] = iso.split('-').map(Number);
    return new Date(Date.UTC(y, m - 1, d, 12))
      .toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric', timeZone: 'UTC' });
  }
  function relDay(iso, today) {
    if (!today) return '';
    if (iso === today) return 'Today';
    if (iso === addDaysIso(today, 1)) return 'Tomorrow';
    if (iso === addDaysIso(today, -1)) return 'Yesterday';
    return '';
  }
  function dayLabel(iso) {
    const rel = relDay(iso, agToday);
    return (rel ? rel + ' · ' : '') + fmtDayLabel(iso);
  }
  function isOverdue(c) { return typeof c.days_until_due === 'number' && c.days_until_due < 0; }
  function isUndated(c) { return c.due_date === null || c.due_date === undefined; }

  function setGran(next) {
    agendaGran = next === 'day' ? 'day' : 'week';
    localStorage.setItem(AG_GRAN_KEY, agendaGran);
    for (const b of agendaGranEl.querySelectorAll('.navbtn'))
      b.classList.toggle('active', b.dataset.gran === agendaGran);
    renderAgenda();
  }

  async function loadAgenda() {
    if (agBusy) return;
    agBusy = true; agendaLoaded = true;
    agendaEl.innerHTML = '<div class="center"><div class="spinner"></div>Building your agenda…</div>';
    try {
      // Omit window_days so overdue + undated + a wide future set all arrive once;
      // Week/Day is a client-side view over this single fetch.
      const r = await fetch('/agenda?limit=50');
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      agItems = data.commitments || [];
      agToday = (data.today && data.today.date) || null;
      if (!agDay) agDay = agToday;
      renderAgenda();
    } catch (e) {
      agendaEl.innerHTML = '<div class="center"><h2>Couldn\'t build agenda</h2><p>'
        + esc(String(e && e.message || e)) + '</p><p>Is GUM running?</p></div>';
    }
    agBusy = false;
  }

  function renderAgenda() {
    if (!agItems.length) {
      agendaEl.innerHTML = `
        <div class="center"><div class="big">🗓️</div>
        <h2>Nothing on the radar</h2>
        <p>GUMBO surfaces commitments and deadlines as it learns them. Let it keep watching.</p></div>`;
      return;
    }
    agendaEl.innerHTML = agendaGran === 'day' ? renderDay() : renderWeek();
  }

  function section(label, items, cls) {
    if (!items.length) return '';
    return `<div class="agenda-section ${cls || ''}"><h3>${esc(label)}</h3>`
      + items.map(agItemHtml).join('') + `</div>`;
  }

  function renderWeek() {
    const today = agToday;
    let html = section('Overdue', agItems.filter(isOverdue), 'overdue');
    const weekEnd = today ? addDaysIso(today, 6) : null;
    for (let i = 0; i < 7 && today; i++) {
      const iso = addDaysIso(today, i);
      const items = agItems.filter(c => c.due_date === iso && !isOverdue(c));
      html += section(dayLabel(iso), items);
    }
    const later = agItems.filter(c => !isUndated(c) && !isOverdue(c) && (!weekEnd || c.due_date > weekEnd));
    html += section('Later', later);
    html += section('No date', agItems.filter(isUndated));
    return html;
  }

  function renderDay() {
    const day = agDay || agToday;
    const isToday = day === agToday;
    let html = `
      <div class="day-nav">
        <button data-nav="-1" title="Previous day">‹</button>
        <div class="day-label">${esc(day ? dayLabel(day) : '—')}</div>
        <button data-nav="1" title="Next day">›</button>
      </div>`;
    const overdue = isToday ? agItems.filter(isOverdue) : [];
    const due = agItems.filter(c => c.due_date === day && !isOverdue(c));
    html += section('Overdue', overdue, 'overdue');
    html += section(isToday ? 'Due today' : 'Due this day', due);
    if (!overdue.length && !due.length) {
      html += `<div class="center" style="padding:44px 20px"><p>Nothing due ${esc(isToday ? 'today' : 'this day')}.</p></div>`;
    }
    if (isToday) html += section('No fixed date', agItems.filter(isUndated));
    return html;
  }

  function dueChipText(c) {
    const d = c.days_until_due;
    if (typeof d !== 'number') return 'Due ' + c.due_date;
    if (d === 0) return 'Due today';
    if (d < 0) return `${-d} day${d === -1 ? '' : 's'} overdue`;
    if (d === 1) return 'Due tomorrow';
    return `Due in ${d} days`;
  }

  function agItemHtml(c) {
    const overdue = isOverdue(c);
    const dueChip = isUndated(c)
      ? `<span class="ag-chip">No date</span>`
      : `<span class="ag-chip due ${overdue ? 'overdue' : ''}">${esc(dueChipText(c))}</span>`;
    // Explicitly-added items (via the MCP tool or the user) carry an item_id and
    // get a small badge so the origin is clear.
    const addedChip = c.item_id ? `<span class="ag-chip added">added</span>` : '';
    const statusChip = (c.status_guess && c.status_guess !== 'unknown')
      ? `<span class="ag-chip">${esc(c.status_guess)}</span>` : '';
    const confChip = (typeof c.confidence === 'number')
      ? `<span class="ag-src">confidence ${c.confidence}/10</span>` : '';
    const src = (c.source && c.source !== 'unknown' && c.source !== 'you')
      ? `<span class="ag-src">· ${esc(c.source)}</span>` : '';
    const actions = c.editable
      ? `<div class="ag-actions">
           <button class="ag-btn ag-edit">Edit</button>
           <button class="ag-btn danger ag-dismiss">Dismiss</button>
         </div>`
      : `<div class="ag-actions"><span class="ag-note"
             title="GUMBO couldn't link this to a source proposition, so it can't be edited">not editable</span></div>`;
    return `
      <div class="ag-item ${overdue ? 'overdue' : ''}" data-id="${c.proposition_id ?? ''}"
           data-item-id="${c.item_id ?? ''}"
           data-title="${escAttr(c.title)}" data-due="${escAttr(c.due_date || '')}"
           data-status="${escAttr(c.status_guess || '')}">
        <div class="ag-row">
          <div class="ag-main">
            <div class="ag-title">${esc(c.title)}</div>
            <div class="ag-meta">${addedChip}${dueChip}${statusChip}${confChip}${src}</div>
          </div>
          ${actions}
        </div>
      </div>`;
  }

  // Route edit/dismiss/undo to the right endpoint family: added items
  // (item_id) hit /agenda/item/{id}; model-extracted commitments hit
  // /agenda/{proposition_id}.
  function agBase(item) {
    const iid = item.dataset.itemId;
    if (iid) return '/agenda/item/' + encodeURIComponent(iid);
    const pid = item.dataset.id;
    if (pid) return '/agenda/' + encodeURIComponent(pid);
    return null;
  }

  // Inline edit: swap the item's row into a small editor, then PATCH /agenda/{id}.
  function startAgEdit(item) {
    if (item.classList.contains('editing')) return;
    item.classList.add('editing');
    const title = item.dataset.title || '';
    const due = item.dataset.due || '';
    const status = item.dataset.status || '';
    const statuses = ['not started', 'in progress', 'blocked', 'done', 'unknown'];
    const opts = statuses.map(s =>
      `<option value="${escAttr(s)}" ${s === status ? 'selected' : ''}>${esc(s)}</option>`).join('');
    const row = item.querySelector('.ag-row');
    row.dataset.orig = row.innerHTML;
    row.innerHTML = `
      <div class="ag-main">
        <div class="ag-editor">
          <div>
            <label>Title</label>
            <input class="ag-e-title" type="text" value="${escAttr(title)}">
          </div>
          <div class="ag-field-row">
            <div><label>Due date</label><input class="ag-e-due" type="date" value="${escAttr(due)}"></div>
            <div><label>Status</label><select class="ag-e-status">${opts}</select></div>
          </div>
          <label class="ag-clear"><input type="checkbox" class="ag-e-clear"> No fixed date</label>
          <div class="ag-actions">
            <button class="ag-btn ag-save" style="color:#fff;background:var(--accent);border-color:var(--accent)">Save</button>
            <button class="ag-btn ag-cancel">Cancel</button>
          </div>
        </div>
      </div>`;
    item.querySelector('.ag-e-title').focus();
  }

  function cancelAgEdit(item) {
    item.classList.remove('editing');
    const row = item.querySelector('.ag-row');
    if (row && row.dataset.orig !== undefined) { row.innerHTML = row.dataset.orig; delete row.dataset.orig; }
  }

  async function saveAgEdit(item) {
    const base = agBase(item);
    if (!base) return;
    const title = item.querySelector('.ag-e-title').value.trim();
    const due = item.querySelector('.ag-e-due').value.trim();
    const status = item.querySelector('.ag-e-status').value;
    const clear = item.querySelector('.ag-e-clear').checked;
    // Only send fields the user actually changed, so an edit doesn't push a
    // spurious "status" correction observation on every save.
    const body = {};
    if (title && title !== (item.dataset.title || '')) body.title = title;
    if (clear) body.clear_due_date = true;
    else if (due && due !== (item.dataset.due || '')) body.due_date = due;
    if (status && status !== (item.dataset.status || '')) body.status = status;
    if (!Object.keys(body).length) { cancelAgEdit(item); return; }
    const btn = item.querySelector('.ag-save');
    btn.disabled = true;
    try {
      const r = await fetch(base, {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      if (!data.ok) throw new Error(data.error || 'failed');
      loadAgenda();
    } catch (e) {
      btn.disabled = false; btn.textContent = "Couldn't — retry";
    }
  }

  async function dismissAgItem(item) {
    const base = agBase(item);
    if (!base) return;
    const btn = item.querySelector('.ag-dismiss');
    if (btn) btn.disabled = true;
    try {
      const r = await fetch(base + '/dismiss', { method: 'POST' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      if (!data.ok) throw new Error('failed');
      // Replace the item body with an inline Undo affordance (no full reload, so
      // the user can reverse a mis-click before it scrolls away). The undo URL is
      // carried on the button so it works for both endpoint families.
      const title = item.dataset.title || 'Item';
      const undoUrl = base + '/undo';
      item.classList.remove('overdue');
      item.innerHTML = `<div class="ag-undo"><span>Dismissed “${esc(title)}”.</span>
        <button class="ag-btn ag-undo-btn" data-endpoint="${escAttr(undoUrl)}">Undo</button></div>`;
    } catch (e) {
      if (btn) { btn.disabled = false; btn.textContent = "Couldn't — retry"; }
    }
  }

  async function undoAgItem(endpoint, item) {
    try {
      const r = await fetch(endpoint, { method: 'POST' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      loadAgenda();
    } catch (e) {
      const b = item && item.querySelector('.ag-undo-btn');
      if (b) b.textContent = "Couldn't — retry";
    }
  }

  agendaEl.addEventListener('click', (e) => {
    if (e.target.closest('.ag-cancel')) { cancelAgEdit(e.target.closest('.ag-item')); return; }
    if (e.target.closest('.ag-save')) { saveAgEdit(e.target.closest('.ag-item')); return; }
    if (e.target.closest('.ag-edit')) { startAgEdit(e.target.closest('.ag-item')); return; }
    if (e.target.closest('.ag-dismiss')) { dismissAgItem(e.target.closest('.ag-item')); return; }
    const undoBtn = e.target.closest('.ag-undo-btn');
    if (undoBtn) { undoAgItem(undoBtn.dataset.endpoint, undoBtn.closest('.ag-item')); return; }
    const navBtn = e.target.closest('.day-nav button');
    if (navBtn) { agDay = addDaysIso(agDay || agToday, parseInt(navBtn.dataset.nav, 10)); renderAgenda(); return; }
  });

  agendaGranEl.addEventListener('click', (e) => {
    const b = e.target.closest('.navbtn');
    if (b && b.dataset.gran !== agendaGran) setGran(b.dataset.gran);
  });
  agendaRefresh.addEventListener('click', () => loadAgenda());

  // ── Feedback (thumbs) ─────────────────────────────────────────────────────
  // A reaction is itself an observation about the user (paper §4.3): POST it so
  // the GUM learns which proactive suggestions land and future ones improve.
  async function sendFeedback(card, vote) {
    const actions = card.querySelector('.actions');
    if (actions.classList.contains('done')) return;
    actions.classList.add('done');
    actions.querySelector(`.fb[data-vote="${vote}"]`).classList.add('chosen');
    const body = {
      title: card.dataset.title || '',
      description: card.dataset.desc || '',
      vote,
    };
    if (active !== ALL) body.focus = active;
    try {
      const r = await fetch('/suggestions/feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const thanks = document.createElement('span');
      thanks.className = 'fb-thanks';
      thanks.textContent = vote === 'up' ? 'Thanks — noted 👍' : 'Thanks — GUMBO will adjust';
      actions.appendChild(thanks);
    } catch (e) {
      // Let the user try again if the write didn't land.
      actions.classList.remove('done');
      actions.querySelector(`.fb[data-vote="${vote}"]`).classList.remove('chosen');
      actions.querySelector('.fb-label').textContent = "Couldn't save — try again";
    }
  }

  // ── Edit + execute ────────────────────────────────────────────────────────
  // Card edits are deliberately ephemeral: they shape this execution request
  // without rewriting GUM memory or the next batch of generated suggestions.
  function syncSuggestionEditor(card) {
    const title = card.querySelector('.exec-title').value.trim();
    const description = card.querySelector('.exec-description').value.trim();
    if (!title || !description) return false;
    card.dataset.title = title;
    card.dataset.desc = description;
    card.querySelector('.title').textContent = title;
    let desc = card.querySelector('.desc');
    if (!desc) {
      desc = document.createElement('p');
      desc.className = 'desc';
      card.querySelector('.card-head').after(desc);
    }
    desc.textContent = description;
    return true;
  }

  function toggleSuggestionEditor(card) {
    if (card.classList.contains('executing')) return;
    const editor = card.querySelector('.execution-editor');
    const btn = card.querySelector('.edit-suggestion');
    if (!editor.hidden && !syncSuggestionEditor(card)) {
      editor.querySelector(!editor.querySelector('.exec-title').value.trim()
        ? '.exec-title' : '.exec-description').focus();
      return;
    }
    editor.hidden = !editor.hidden;
    btn.textContent = editor.hidden ? '✎ Edit' : 'Done editing';
    if (!editor.hidden) editor.querySelector('.exec-title').focus();
  }

  function execEl(tag, className, text) {
    const el = document.createElement(tag);
    if (className) el.className = className;
    if (text !== undefined) el.textContent = text;
    return el;
  }

  function renderExecutionResult(card, outcome) {
    const panel = card.querySelector('.execution-result');
    delete panel.dataset.decided;
    panel.hidden = false;
    panel.className = 'execution-result ' + (outcome.status || 'failed');
    panel.replaceChildren();

    const labels = {
      pending_approval: '✓ Draft ready for review',
      proposal_only: 'Held by the safety gate',
      failed: 'Execution failed',
    };
    panel.appendChild(execEl('div', 'exec-head', labels[outcome.status] || 'Execution result'));

    if (outcome.assessment) {
      const a = outcome.assessment;
      panel.appendChild(execEl(
        'p', 'exec-copy',
        `Safety check: ${a.reversibility || 'unknown'}, risk ${a.risk ?? '—'}/10${a.rationale ? ' — ' + a.rationale : ''}`
      ));
    }

    if (outcome.status === 'pending_approval' && outcome.result) {
      panel.appendChild(execEl('pre', 'exec-output', outcome.result.output || '(empty draft)'));
      const review = execEl('div', 'exec-review');
      review.appendChild(execEl(
        'span', 'exec-review-note',
        'Approval records feedback; it does not commit an external action.'
      ));
      const approve = execEl('button', 'exec-decision', 'Approve');
      approve.dataset.vote = 'up';
      const reject = execEl('button', 'exec-decision', 'Reject');
      reject.dataset.vote = 'down';
      review.append(approve, reject);
      panel.appendChild(review);
    } else {
      panel.appendChild(execEl(
        'p', 'exec-copy',
        outcome.reason || 'No agent draft was produced.'
      ));
      if (outcome.status === 'failed') {
        panel.appendChild(execEl('button', 'exec-retry', 'Retry'));
      }
    }
  }

  function renderExecutionError(card, message) {
    renderExecutionResult(card, { status: 'failed', reason: message });
  }

  async function executeSuggestion(card) {
    if (!executionEnabled || card.classList.contains('executing')) return;
    if (!syncSuggestionEditor(card)) {
      card.querySelector('.execution-editor').hidden = false;
      card.querySelector('.edit-suggestion').textContent = 'Done editing';
      renderExecutionError(card, 'Suggestion title and description are required.');
      card.querySelector(!card.querySelector('.exec-title').value.trim()
        ? '.exec-title' : '.exec-description').focus();
      return;
    }

    const editor = card.querySelector('.execution-editor');
    editor.hidden = true;
    card.querySelector('.edit-suggestion').textContent = '✎ Edit';
    card.classList.add('executing');
    const executeBtn = card.querySelector('.execute-suggestion');
    const editBtn = card.querySelector('.edit-suggestion');
    executeBtn.disabled = true;
    editBtn.disabled = true;
    executeBtn.textContent = 'Executing…';
    const panel = card.querySelector('.execution-result');
    panel.hidden = false;
    panel.className = 'execution-result';
    panel.replaceChildren(execEl('div', 'exec-head', 'GUMBO is executing this suggestion…'));

    const suggestion = {
      title: card.dataset.title || '',
      description: card.dataset.desc || '',
      rationale: card.dataset.rationale || '',
      probability_useful: parseInt(card.dataset.probabilityUseful, 10),
      benefit: parseInt(card.dataset.benefit, 10),
      cost_if_wrong: parseInt(card.dataset.costIfWrong, 10),
      cost_if_missed: parseInt(card.dataset.costIfMissed, 10),
    };
    const body = {
      suggestion,
      comments: card.querySelector('.exec-comments').value.trim() || null,
    };
    if (active !== ALL) body.focus = active;

    try {
      const r = await fetch('/suggestions/execute', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      if (!data.ok) throw new Error(data.error || 'execution failed');
      if (!data.outcomes || !data.outcomes.length) throw new Error('no execution outcome returned');
      renderExecutionResult(card, data.outcomes[0]);
    } catch (err) {
      renderExecutionError(card, err && err.message || String(err));
    } finally {
      card.classList.remove('executing');
      executeBtn.disabled = !executionEnabled;
      editBtn.disabled = false;
      executeBtn.textContent = '▶ Execute';
    }
  }

  async function decideExecution(card, vote, button) {
    const panel = card.querySelector('.execution-result');
    if (panel.dataset.decided) return;
    const buttons = [...panel.querySelectorAll('.exec-decision')];
    buttons.forEach(b => { b.disabled = true; });
    const body = {
      title: card.dataset.title || '',
      description: card.dataset.desc || '',
      vote,
    };
    if (active !== ALL) body.focus = active;
    try {
      const r = await fetch('/suggestions/feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      if (!data.ok) throw new Error(data.error || 'feedback failed');
      panel.dataset.decided = vote;
      button.textContent = vote === 'up' ? 'Approved ✓' : 'Rejected';
    } catch (err) {
      buttons.forEach(b => { b.disabled = false; });
      button.textContent = 'Couldn\'t save — retry';
    }
  }

  main.addEventListener('click', (e) => {
    const decision = e.target.closest('.exec-decision');
    if (decision) { decideExecution(decision.closest('.card'), decision.dataset.vote, decision); return; }
    const retry = e.target.closest('.exec-retry');
    if (retry) { executeSuggestion(retry.closest('.card')); return; }
    const executeBtn = e.target.closest('.execute-suggestion');
    if (executeBtn) { executeSuggestion(executeBtn.closest('.card')); return; }
    const editBtn = e.target.closest('.edit-suggestion');
    if (editBtn) { toggleSuggestionEditor(editBtn.closest('.card')); return; }
    const chatBtn = e.target.closest('.chatbtn');
    if (chatBtn) { toggleChat(chatBtn.closest('.card')); return; }
    const btn = e.target.closest('.fb');
    if (!btn) return;
    const card = btn.closest('.card');
    if (card) sendFeedback(card, btn.dataset.vote);
  });

  // ── Start Chat (paper §4.3.3) ─────────────────────────────────────────────
  // Open an inline conversation with GUMBO about a specific suggestion. The
  // running turns are POSTed to /suggestions/chat, where the local text model
  // replies grounded in the same high-confidence propositions the suggestion
  // came from. Each card keeps its own conversation state.
  function toggleChat(card) {
    const existing = card.querySelector('.chat');
    if (existing) { existing.remove(); return; }
    const suggestion = {
      title: card.dataset.title || '',
      description: card.dataset.desc || '',
      rationale: card.dataset.rationale || '',
    };
    const turns = [];  // {role, content}
    const chat = document.createElement('div');
    chat.className = 'chat';
    chat.innerHTML = `
      <div class="chat-log"></div>
      <div class="chat-input">
        <textarea rows="1" placeholder="Ask GUMBO to go deeper, draft, or plan…"></textarea>
        <button class="chat-send">Send</button>
      </div>`;
    card.appendChild(chat);
    const log = chat.querySelector('.chat-log');
    const box = chat.querySelector('textarea');
    const send = chat.querySelector('.chat-send');

    function addMsg(role, text, cls) {
      const el = document.createElement('div');
      el.className = 'msg ' + role + (cls ? ' ' + cls : '');
      el.textContent = text;
      log.appendChild(el);
      log.scrollTop = log.scrollHeight;
      return el;
    }

    async function submit() {
      const text = box.value.trim();
      if (!text || send.disabled) return;
      box.value = '';
      addMsg('user', text);
      turns.push({ role: 'user', content: text });
      send.disabled = true;
      const pending = addMsg('assistant', 'GUMBO is thinking…', 'pending');
      try {
        const body = { messages: turns, suggestion };
        if (active !== ALL) body.focus = active;
        const r = await fetch('/suggestions/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const data = await r.json();
        if (!data.ok) throw new Error(data.error || 'chat failed');
        pending.classList.remove('pending');
        pending.textContent = data.reply || '(no reply)';
        turns.push({ role: 'assistant', content: data.reply || '' });
      } catch (err) {
        pending.classList.remove('pending');
        pending.style.opacity = '.7';
        pending.textContent = "Couldn't reach GUMBO — " + (err && err.message || err);
        turns.pop();  // drop the unanswered user turn so a retry is clean
      }
      send.disabled = false;
      box.focus();
    }

    send.addEventListener('click', submit);
    box.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
    });
    box.focus();
  }

  surfacedOnly.addEventListener('change', () => load());

  nav.addEventListener('click', (e) => {
    const btn = e.target.closest('.navbtn');
    if (btn && btn.dataset.view !== view) setView(btn.dataset.view);
  });

  // Debounced search on the Memory page.
  let memTimer = null;
  memSearch.addEventListener('input', () => {
    clearTimeout(memTimer);
    memTimer = setTimeout(loadMemory, 250);
  });

  renderTabs();
  // Reflect the persisted Week/Day choice on the toggle before first paint.
  for (const b of agendaGranEl.querySelectorAll('.navbtn'))
    b.classList.toggle('active', b.dataset.gran === agendaGran);
  // Deep-link: the tray's "Open Agenda" opens /gumbo#agenda, so honor the hash
  // over the last-active view; otherwise restore whatever view was last shown.
  setView(location.hash === '#agenda' ? 'agenda' : view);
  window.addEventListener('hashchange', () => { if (location.hash === '#agenda') setView('agenda'); });
</script>
</body>
</html>
